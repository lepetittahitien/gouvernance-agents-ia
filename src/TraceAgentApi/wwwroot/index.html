<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>Gouvernance Agents IA — Trace viewer</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #0f1115;
    --panel: #171a21;
    --border: #2a2e37;
    --text: #e6e8ec;
    --muted: #9aa0ab;
    --accent: #5b8def;
    --accent-2: #e2a336;
    --ok: #3fbf6f;
    --danger: #e0505a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 1.1rem; margin: 0; }
  header p { margin: 0.25rem 0 0; color: var(--muted); font-size: 0.85rem; }

  .layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    min-height: calc(100vh - 70px);
  }
  aside {
    border-right: 1px solid var(--border);
    padding: 1rem;
    overflow-y: auto;
  }
  main { padding: 1.5rem; overflow-y: auto; }

  form { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.25rem; }
  input[type=text] {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.55rem 0.7rem;
    border-radius: 6px;
    font-size: 0.9rem;
  }
  button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 0.55rem 0.9rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.9rem;
  }
  button:disabled { opacity: 0.5; cursor: default; }

  .run-item {
    padding: 0.6rem 0.7rem;
    border-radius: 6px;
    cursor: pointer;
    border: 1px solid transparent;
    margin-bottom: 0.35rem;
  }
  .run-item:hover { background: var(--panel); }
  .run-item.active { background: var(--panel); border-color: var(--accent); }
  .run-item.pii-violation { border-color: var(--danger); }
  .run-item .prompt { font-size: 0.85rem; }
  .run-item .meta { font-size: 0.75rem; color: var(--muted); margin-top: 0.2rem; }
  .pii-badge {
    display: inline-block;
    background: var(--danger);
    color: white;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 0.1rem 0.4rem;
    border-radius: 4px;
    vertical-align: middle;
  }

  .empty { color: var(--muted); font-size: 0.9rem; }

  .stat-row { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .stat {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    min-width: 120px;
  }
  .stat .label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.03em; }
  .stat .value { font-size: 1.3rem; font-weight: 600; margin-top: 0.15rem; }

  .timeline { display: flex; flex-direction: column; gap: 0.6rem; }
  .step {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.7rem 0.9rem;
  }
  .step-head { display: flex; justify-content: space-between; align-items: baseline; gap: 1rem; }
  .step-title { font-size: 0.85rem; font-weight: 600; }
  .step-title.model { color: var(--accent); }
  .step-title.tool { color: var(--accent-2); }
  .step-title.denial { color: var(--danger); }
  .step.step-denial { border-color: var(--danger); }
  .step-duration { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }
  .step-detail { font-size: 0.8rem; color: var(--muted); margin-top: 0.3rem; white-space: pre-wrap; }
  .bar-track { background: #0000; height: 6px; margin-top: 0.5rem; border-radius: 3px; overflow: hidden; background: #232733; }
  .bar-fill { height: 100%; border-radius: 3px; }
  .bar-fill.model { background: var(--accent); }
  .bar-fill.tool { background: var(--accent-2); }
  .bar-fill.denial { background: var(--danger); }

  .pii-violation-banner {
    background: var(--panel);
    border: 1px solid var(--danger);
    border-radius: 8px;
    padding: 0.7rem 0.9rem;
    margin-bottom: 1rem;
  }
  .pii-violation-banner .label { color: var(--danger); font-size: 0.8rem; font-weight: 600; margin-bottom: 0.4rem; }
  .pii-chip {
    display: inline-block;
    background: var(--bg);
    border: 1px solid var(--danger);
    color: var(--danger);
    font-size: 0.75rem;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    margin-right: 0.3rem;
  }

  .final-answer {
    margin-top: 1.5rem;
    background: var(--panel);
    border: 1px solid var(--ok);
    border-radius: 8px;
    padding: 0.9rem 1rem;
    font-size: 0.9rem;
  }
  .final-answer .label { color: var(--ok); font-size: 0.75rem; text-transform: uppercase; margin-bottom: 0.4rem; }
</style>
</head>
<body>
<header>
  <h1>Gouvernance Agents IA — Trace viewer</h1>
  <p>Ce que fait l'agent, ce que ça coûte, combien de temps ça prend.</p>
</header>

<div class="layout">
  <aside>
    <form id="run-form">
      <input type="text" id="prompt-input" placeholder="Quelle est la météo à... ?" required />
      <button type="submit" id="run-button">Lancer un run</button>
    </form>
    <div id="run-list"></div>
  </aside>

  <main id="detail">
    <p class="empty">Sélectionne un run à gauche, ou lance-en un nouveau.</p>
  </main>
</div>

<script src="app.js"></script>
</body>
</html>
